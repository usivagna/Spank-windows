name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate placeholder audio
        run: python scripts/generate_audio.py

      - name: Build
        run: go build -ldflags "-X main.version=${{ github.ref_name }}" -o spank.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spank-windows-amd64
          path: spank.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: spank-windows-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: spank.exe
          generate_release_notes: true
